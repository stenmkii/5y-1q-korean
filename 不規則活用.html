<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不規則活用トレーニング</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>不規則活用練習</h1>
        <p id="irreg-counter" style="margin-top:5px; font-size:0.8rem; opacity:0.8;">1 / 10</p>
    </header>

    <div class="container">
        <div id="irreg-quiz-screen" class="base-card">
            <div id="irreg-word" style="font-size: 2rem; font-weight: bold; color: var(--primary); margin-bottom: 10px;"></div>
            <div id="irreg-instruction" style="margin-bottom: 20px; color: var(--text-light); font-size: 0.9rem;"></div>
            <div id="irreg-options" style="display: grid; gap: 12px;"></div>
            <div id="irreg-feedback" style="margin-top: 20px; font-weight: bold; min-height: 1.5em; font-size: 1.1rem;"></div>
            <button id="irreg-next-btn" class="btn btn-primary hidden" style="margin-top: 15px;">次の問題へ</button>
        </div>

        <div id="irreg-result-screen" class="base-card hidden">
            <h2>お疲れ様でした！</h2>
            <p id="irreg-score-text" style="font-size: 1.5rem; font-weight: bold; color: var(--primary); margin: 20px 0;"></p>
            <button onclick="location.reload()" class="btn btn-primary">もう一度挑戦</button>
            <button onclick="location.href='index.html'" class="btn" style="margin-top: 10px;">ホームへ戻る</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
