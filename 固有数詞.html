<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>固有数詞マスター</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>固有数詞マスター</h1>
        <p id="progress" style="margin-top: 5px; opacity: 0.8; font-size: 0.8rem;"></p>
    </header>

    <div class="container">
        <!-- モード選択画面 -->
        <div id="menu" class="base-card">
            <h2 style="margin-top:0; font-size: 1.1rem;">学習モードを選択</h2>
            <button class="btn" onclick="startNumQuiz('kn-jp')">ハングル → 日本語</button>
            <button class="btn" onclick="startNumQuiz('jp-kn')">日本語 → ハングル</button>
            <button class="btn" onclick="startNumQuiz('unit')">単位をつける (変形注意)</button>
            <button class="btn btn-primary" style="margin-top:10px" onclick="location.href='index.html'">ホームへ戻る</button>
        </div>

        <!-- クイズ画面 -->
        <div id="quiz" class="base-card hidden">
            <div id="section-title" style="color:var(--primary); font-size:0.8rem; font-weight:bold; margin-bottom: 10px;"></div>
            <div id="question" style="font-size: 2.5rem; font-weight: bold; margin: 20px 0;"></div>
            <div id="options" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;"></div>
            <button class="btn" style="margin-top:25px; border-color:#ccc; color:#666;" onclick="showMenu()">中断して戻る</button>
        </div>

        <!-- 結果画面 -->
        <div id="result" class="base-card hidden">
            <h2>結果発表</h2>
            <p id="result-score" style="font-size:3rem; font-weight:bold; color:var(--primary); margin: 20px 0;"></p>
            <button class="btn btn-primary" onclick="showMenu()">モード選択に戻る</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
