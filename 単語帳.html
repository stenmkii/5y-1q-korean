<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>単語帳</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .flash-card {
            perspective: 1000px;
            height: 300px;
            cursor: pointer;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .flash-card.flipped .card-inner { transform: rotateY(180deg); }
        .side {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border-radius: 20px;
            background: white;
            box-shadow: var(--shadow);
        }
        .back { transform: rotateY(180deg); background: #f8f9fa; }
    </style>
</head>
<body>
    <header>
        <h1>単語帳</h1>
        <p id="counter" style="margin-top:5px; font-size:0.8rem; opacity:0.8;">0 / 0</p>
    </header>
    <div class="container">
        <div class="flash-card" id="card-trigger">
            <div class="card-inner">
                <div class="side front">
                    <div style="color:var(--primary); font-size:0.8rem; font-weight:bold; margin-bottom:10px;">KOREAN</div>
                    <div id="word-display" style="font-size:2rem; font-weight:bold;">---</div>
                </div>
                <div class="side back">
                    <div style="color:var(--primary); font-size:0.8rem; font-weight:bold; margin-bottom:10px;">JAPANESE</div>
                    <div id="meaning-display" style="font-size:1.5rem; font-weight:bold;">---</div>
                    <div id="note-display" style="margin-top:15px; color:#636e72; font-size:0.9rem;"></div>
                </div>
            </div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
            <button class="btn" id="prev-btn">前へ</button>
            <button class="btn" id="next-btn">次へ</button>
        </div>
        <button class="btn btn-primary" onclick="location.href='index.html'">ホームに戻る</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
