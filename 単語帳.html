<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOCABULARY</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .flash-card { height: 280px; cursor: pointer; perspective: 1000px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.4s; transform-style: preserve-3d; }
        .flash-card.flipped .card-inner { transform: rotateY(180deg); }
        .side {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 30px; border: 1px solid var(--primary); background: #fff;
        }
        .back { transform: rotateY(180deg); border-style: dashed; }
    </style>
</head>
<body>
    <header>
        <h1>Vocabulary</h1>
        <p id="counter" style="font-size:0.7rem; margin-top:10px; color:var(--text-light);">0 / 0</p>
    </header>
    <div class="container">
        <div class="flash-card" id="card-trigger">
            <div class="card-inner">
                <div class="side front">
                    <div id="word-display" style="font-size:2rem; font-weight:700;">---</div>
                </div>
                <div class="side back">
                    <div id="meaning-display" style="font-size:1.2rem; font-weight:600;">---</div>
                    <div id="note-display" style="margin-top:20px; font-size:0.8rem; color:var(--text-light);"></div>
                </div>
            </div>
        </div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn" id="prev-btn">PREV</button>
            <button class="btn" id="next-btn">NEXT</button>
        </div>
        <button class="btn btn-primary" onclick="location.href='index.html'" style="margin-top:10px;">HOME</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
